services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: thought_os
      POSTGRES_PASSWORD: thought_os_dev
      POSTGRES_DB: thought_os
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
